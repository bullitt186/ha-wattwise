type: custom:card-templater
now:
  show: true
grid_options:
  columns: full
card:
  type: custom:apexcharts-card
  graph_span_template: "{{(states('sensor.wattwise_forecast_horizon') | int) + 23 }}h"
  apex_config:
    chart:
      height: 400px
  experimental:
    hidden_by_default: true
  span:
    start: hour
    offset: "-1day"
  all_series_config:
    stroke_width: 2
    show:
      legend_value: false
  header:
    show: true
    title: History/Forecast
  now:
    show: true
    label: now
  yaxis:
    - id: kWh
      show: true
      decimals: 0
      apex_config:
        tickAmount: 11
    - id: ct
      show: true
      opposite: true
      decimals: 0
      apex_config:
        tickAmount: 4
  series:
    - entity: sensor.wattwise_battery_charge_from_solar
      name: Charge/Solar (forecast)
      type: line
      yaxis_id: kWh
      unit: kW
      extend_to: false
      data_generator: |
        return entity.attributes.forecast.map(item => {
          return [new Date(item[0]).getTime(), item[1]];
        });
      color: skyblue
    - entity: sensor.wattwise_battery_charge_from_solar
      name: Charge/Solar (forecast*)
      type: line
      curve: stepline
      yaxis_id: kWh
      unit: kW
      extend_to: false
      color: skyblue
      opacity: 0.2
      show:
        hidden_by_default: false
    - entity: sensor.wattwise_battery_charge_from_grid
      name: Charge/Grid (forecast)
      type: line
      curve: stepline
      yaxis_id: kWh
      unit: kW
      extend_to: false
      data_generator: |
        return entity.attributes.forecast.map(item => {
          return [new Date(item[0]).getTime(), item[1]];
        });
      color: steelblue
    - entity: sensor.wattwise_battery_charge_from_grid
      name: Charge/Grid (forecast*)
      type: line
      yaxis_id: kWh
      unit: kW
      extend_to: false
      color: steelblue
      opacity: 0.2
      show:
        hidden_by_default: false
    - entity: sensor.power_to_battery_total_kw
      name: Charge (actual)
      yaxis_id: kWh
      unit: kW
      extend_to: false
      color: steelblue
      stroke_dash: 2
      group_by:
        func: avg
        duration: 5m
    - entity: sensor.wattwise_battery_discharge
      name: Discharge (forecast)
      type: line
      yaxis_id: kWh
      unit: kW
      extend_to: false
      data_generator: |
        return entity.attributes.forecast.map(item => {
          return [new Date(item[0]).getTime(), item[1]];
        });
      color: lightsalmon
    - entity: sensor.wattwise_battery_discharge
      name: Discharge (forecast*)
      type: line
      yaxis_id: kWh
      unit: kW
      extend_to: false
      color: lightsalmon
      opacity: 0.2
      show:
        hidden_by_default: false
    - entity: sensor.power_from_battery_total_kw
      name: Discharge (actual)
      yaxis_id: kWh
      unit: kW
      extend_to: false
      color: lightsalmon
      stroke_dash: 2
      group_by:
        func: avg
        duration: 5m
    - entity: sensor.wattwise_grid_export
      name: Export (forecast)
      yaxis_id: kWh
      unit: kW
      extend_to: false
      data_generator: |
        return entity.attributes.forecast.map(item => {
          return [new Date(item[0]).getTime(), item[1]];
        });
      color: plum
      show:
        hidden_by_default: true
    - entity: sensor.wattwise_grid_export
      name: Export (forecast*)
      yaxis_id: kWh
      unit: kW
      extend_to: false
      color: plum
      opacity: 0.2
      show:
        hidden_by_default: true
    - entity: sensor.netzeinspeisung_kw
      name: Export (actual)
      yaxis_id: kWh
      unit: kW
      extend_to: false
      color: plum
      show:
        hidden_by_default: true
      stroke_dash: 2
      group_by:
        func: avg
        duration: 5m
    - entity: sensor.wattwise_grid_import
      name: Import (forecast)
      yaxis_id: kWh
      unit: kW
      extend_to: false
      show:
        hidden_by_default: true
      data_generator: |
        return entity.attributes.forecast.map(item => {
          return [new Date(item[0]).getTime(), item[1]];
        });
      color: green
    - entity: sensor.wattwise_grid_import
      name: Import (forecast*)
      yaxis_id: kWh
      unit: kW
      extend_to: false
      color: green
      opacity: 0.2
      show:
        hidden_by_default: true
    - entity: sensor.netzbezug_kw
      name: Import (actual)
      yaxis_id: kWh
      unit: kW
      extend_to: false
      show:
        hidden_by_default: true
      color: green
      stroke_dash: 2
      group_by:
        func: avg
        duration: 5m
    - entity: sensor.zendure_manager_available_kwh
      name: SoC (actual)
      yaxis_id: kWh
      unit: kWh
      extend_to: false
      type: area
      opacity: 0.2
      stroke_width: 0
      color: lawngreen
      stroke_dash: 2
      group_by:
        func: avg
        duration: 5m
    - entity: sensor.wattwise_state_of_charge
      name: SoC (forecast)
      yaxis_id: kWh
      unit: kWh
      extend_to: false
      data_generator: |
        return entity.attributes.forecast.map(item => {
          return [new Date(item[0]).getTime(), item[1]];
        });
      color: lawngreen
      type: area
      opacity: 0.2
      stroke_width: 0
    - entity: sensor.wattwise_state_of_charge
      name: SoC (forecast*)
      yaxis_id: kWh
      unit: kWh
      extend_to: false
      color: lawngreen
      type: area
      opacity: 0.2
      stroke_width: 0
      show:
        hidden_by_default: true
    - entity: sensor.consumption_wattwise
      name: Consumption (actual)
      yaxis_id: kWh
      unit: kW
      extend_to: false
      color: tomato
      group_by:
        func: avg
        duration: 5m
      stroke_dash: 2
    - entity: sensor.wattwise_consumption_forecast
      name: Consumption (forecast)
      yaxis_id: kWh
      unit: kW
      extend_to: false
      color: tomato
      data_generator: |
        return entity.attributes.forecast.map(item => {
          return [new Date(item[0]).getTime(), item[1]];
        });
    - entity: sensor.wattwise_consumption_forecast
      name: Consumption (forecast*)
      yaxis_id: kWh
      unit: kW
      extend_to: false
      opacity: 0.2
      stroke_width: 0
      color: tomato
      show:
        hidden_by_default: false
    - entity: sensor.wattwise_solar_production_forecast
      name: Production (forecast)
      yaxis_id: kWh
      unit: kW
      type: area
      stroke_width: 0
      opacity: 0.6
      extend_to: false
      data_generator: |
        return entity.attributes.forecast.map(item => {
          return [new Date(item[0]).getTime(), item[1]];
        });
      color: goldenrod
    - entity: sensor.wattwise_solar_production_forecast
      name: Production (forecast*)
      yaxis_id: kWh
      unit: kW
      extend_to: false
      color: goldenrod
      type: area
      stroke_width: 0
      opacity: 0.4
      show:
        hidden_by_default: false
    - entity: sensor.solarproduktion_kw
      name: Production (actual)
      yaxis_id: kWh
      unit: kW
      extend_to: false
      type: area
      stroke_width: 0
      opacity: 0.6
      group_by:
        func: avg
        duration: 1h
      color: goldenrod
      stroke_dash: 2
    - entity: sensor.wattwise_maximum_discharge_possible
      name: Max Discharge possible
      type: line
      curve: stepline
      yaxis_id: kWh
      unit: kWh
      extend_to: false
      color: aquamarine
      show:
        hidden_by_default: true
      data_generator: |
        return entity.attributes.forecast.map(item => {
          // item[1] ist der kW-Wert
          const kWh = item[1] * 0.25;
          return [new Date(item[0]).getTime(), kWh];
        });
    - entity: sensor.wattwise_maximum_discharge_possible
      name: Max Discharge possible*
      type: line
      curve: stepline
      yaxis_id: kWh
      unit: kWh
      extend_to: false
      transform: return x * 0.25;
      opacity: 0.2
      color: aquamarine
      show:
        hidden_by_default: true
    - entity: binary_sensor.wattwise_battery_discharging_enabled
      name: Discharging Enabled (forecast)
      type: line
      curve: stepline
      extend_to: false
      stroke_width: 2
      color: hotpink
      show:
        hidden_by_default: false
      data_generator: |
        return entity.attributes.forecast.map(item => {
          const value = item[1] === 'on' ? 1 : 0;
          return [new Date(item[0]).getTime(), value];
        });
      yaxis_id: kWh
    - entity: binary_sensor.wattwise_battery_discharging_enabled
      name: Discharging Enabled (forecast*)
      type: line
      curve: stepline
      extend_to: false
      stroke_width: 2
      yaxis_id: kWh
      color: hotpink
      opacity: 0.2
      show:
        hidden_by_default: false
    - entity: binary_sensor.wattwise_battery_charging_from_grid
      name: Charge/Grid Enabled (forecast)
      type: line
      curve: stepline
      extend_to: false
      stroke_width: 2
      color: royalblue
      show:
        hidden_by_default: true
      data_generator: |
        return entity.attributes.forecast.map(item => {
          const value = item[1] === 'on' ? 1 : 0;
          return [new Date(item[0]).getTime(), value];
        });
      yaxis_id: kWh
    - entity: binary_sensor.wattwise_battery_charging_from_grid
      name: Charge/Grid Enabled (forecast*)
      type: line
      curve: stepline
      extend_to: false
      stroke_width: 2
      yaxis_id: kWh
      color: royalblue
      opacity: 0.2
      show:
        hidden_by_default: true
    - entity: sensor.wattwise_energy_prices
      yaxis_id: ct
      name: Price
      color: mediumslateblue
      unit: ct
      type: line
      curve: stepline
      extend_to: false
      stroke_width: 2
      float_precision: 2
      show:
        hidden_by_default: false
      data_generator: >
        const noon = new Date()

        noon.setHours(0, 0, 0, 0)

        const prices =
        entity.attributes.today.concat(entity.attributes.tomorrow,entity.attributes.day_after_tomorrow);

        const data = [];

        for(let i = 0; i < prices.length; i++) {
          data.push([noon.getTime() + i * 1000 * 60 * 15, prices[i].total * 100])
        }

        return data;
    - entity: binary_sensor.wattwise_within_cheapest_hour
      name: Cheapest hour (forecast)
      type: line
      curve: stepline
      extend_to: false
      stroke_width: 2
      color: orange
      unit: on/off
      yaxis_id: kWh
      show:
        hidden_by_default: true
      data_generator: |
        return entity.attributes.forecast.map(item => {
          const value = item[1] === 'on' ? 1 : 0;
          return [new Date(item[0]).getTime(), value];
        });
    - entity: binary_sensor.wattwise_within_cheapest_hour
      name: Cheapest hour (forecast*)
      type: line
      curve: stepline
      extend_to: false
      stroke_width: 2
      yaxis_id: kWh
      color: orange
      opacity: 0.2
      unit: on/off
      show:
        hidden_by_default: true
    - entity: binary_sensor.wattwise_within_cheapest_2_hours
      name: Cheapest 2 hours (forecast)
      type: line
      curve: stepline
      extend_to: false
      stroke_width: 2
      color: gold
      unit: on/off
      yaxis_id: kWh
      show:
        hidden_by_default: true
      data_generator: |
        return entity.attributes.forecast.map(item => {
          const value = item[1] === 'on' ? 1 : 0;
          return [new Date(item[0]).getTime(), value];
        });
    - entity: binary_sensor.wattwise_within_cheapest_2_hours
      name: Cheapest 2 hours (forecast*)
      type: line
      curve: stepline
      extend_to: false
      stroke_width: 2
      yaxis_id: kWh
      color: gold
      opacity: 0.2
      unit: on/off
      show:
        hidden_by_default: true
    - entity: binary_sensor.wattwise_within_cheapest_3_hours
      name: Cheapest 3 hours (forecast)
      type: line
      curve: stepline
      extend_to: false
      stroke_width: 2
      color: red
      unit: on/off
      yaxis_id: kWh
      show:
        hidden_by_default: true
      data_generator: |
        return entity.attributes.forecast.map(item => {
          const value = item[1] === 'on' ? 1 : 0;
          return [new Date(item[0]).getTime(), value];
        });
    - entity: binary_sensor.wattwise_within_cheapest_3_hours
      name: Cheapest 3 hours (forecast*)
      type: line
      curve: stepline
      extend_to: false
      stroke_width: 2
      yaxis_id: kWh
      color: red
      opacity: 0.2
      unit: on/off
      show:
        hidden_by_default: true
entities:
  - sensor.wattwise_forecast_horizon
